<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Chat - Lesson 16</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a4a;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 18px; font-weight: 600; color: #a78bfa; }

    header .model-badge {
      font-size: 12px;
      background: #2a2a4a;
      padding: 4px 10px;
      border-radius: 12px;
      color: #8b8baa;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }

    .message .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }

    .message.user .avatar { background: #3b82f6; }
    .message.assistant .avatar { background: #8b5cf6; }

    .message .content { flex: 1; line-height: 1.6; font-size: 15px; }

    .message .content .role-label {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .message .content .text { white-space: pre-wrap; word-break: break-word; }

    .tool-call {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 10px 14px;
      margin: 8px 0;
      font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .tool-call .tool-name { color: #f59e0b; font-weight: 600; }
    .tool-call .tool-args { color: #94a3b8; }
    .tool-call .tool-result { color: #34d399; margin-top: 4px; }

    .typing-indicator { display: inline-flex; gap: 4px; padding: 4px 0; }

    .typing-indicator span {
      width: 6px; height: 6px;
      background: #8b5cf6;
      border-radius: 50%;
      animation: bounce 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-8px); }
    }

    #input-area {
      background: #1a1a2e;
      border-top: 1px solid #2a2a4a;
      padding: 16px 24px;
    }

    #input-area form {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      gap: 12px;
    }

    #input-area input {
      flex: 1;
      background: #0f0f0f;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s;
    }

    #input-area input:focus { border-color: #8b5cf6; }
    #input-area input::placeholder { color: #555; }

    #input-area button {
      background: #8b5cf6;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #input-area button:hover { background: #7c3aed; }
    #input-area button:disabled { background: #4a4a6a; cursor: not-allowed; }

    .welcome {
      max-width: 720px;
      margin: 0 auto;
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .welcome h2 { color: #a78bfa; font-size: 24px; margin-bottom: 12px; }
    .welcome p { margin-bottom: 8px; font-size: 14px; }

    .welcome .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .welcome .suggestions button {
      background: #1a1a2e;
      border: 1px solid #2a2a4a;
      border-radius: 8px;
      padding: 8px 16px;
      color: #a78bfa;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .welcome .suggestions button:hover {
      background: #2a2a4a;
      border-color: #8b5cf6;
    }

    .error-msg {
      color: #ef4444;
      background: #1a0a0a;
      border: 1px solid #3a1a1a;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
    }

    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>
<body>

  <header>
    <h1>AI Chat</h1>
    <span class="model-badge">llama-3.1-8b</span>
  </header>

  <div id="chat">
    <div class="welcome">
      <h2>Lesson 16: Full Web Chat UI</h2>
      <p>Streaming + Tools + Guardrails — everything from the course, in a browser.</p>
      <p>Try asking something:</p>
      <div class="suggestions">
        <button onclick="sendSuggestion(this.textContent)">What's the weather in Delhi?</button>
        <button onclick="sendSuggestion(this.textContent)">What time is it in Asia/Kolkata?</button>
        <button onclick="sendSuggestion(this.textContent)">Calculate 15 * 7 + 23</button>
        <button onclick="sendSuggestion(this.textContent)">Compare weather in Mumbai and London</button>
      </div>
    </div>
  </div>

  <div id="input-area">
    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Type a message..." autocomplete="off" autofocus>
      <button type="submit" id="send-btn">Send</button>
    </form>
  </div>

  <script>
    // ============================================
    // FRONTEND: Vanilla JS chat client
    // ============================================
    //
    // This does what React's useChat() hook does under the hood:
    //   1. Maintain conversation history
    //   2. Send messages to /api/chat
    //   3. Read SSE stream and update the UI in real-time
    //   4. Handle tool call displays

    const chatEl = document.getElementById("chat");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("user-input");
    const sendBtn = document.getElementById("send-btn");

    // Conversation history sent to server on every request
    // This is how "memory" works (Lesson 3): we send ALL prior messages
    let conversationHistory = [];

    function sendSuggestion(text) {
      input.value = text;
      form.dispatchEvent(new Event("submit"));
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;

      // Remove welcome message
      const welcome = chatEl.querySelector(".welcome");
      if (welcome) welcome.remove();

      // Add user message to UI and history
      addMessage("user", text);
      conversationHistory.push({ role: "user", content: text });

      input.value = "";
      sendBtn.disabled = true;

      // Create assistant message placeholder
      const { contentEl, textEl } = addMessage("assistant", "");
      showTypingIndicator(textEl);

      try {
        // ============================================
        // THE KEY PART: Streaming fetch
        // ============================================
        // This is the browser equivalent of Lesson 4's SSE parsing.
        // We POST to /api/chat and read the streaming response.

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: conversationHistory }),
        });

        if (!response.ok) {
          let errMsg = "Request failed (" + response.status + ")";
          try {
            const err = await response.json();
            errMsg = err.error || errMsg;
          } catch { /* response wasn't JSON */ }
          removeTypingIndicator(textEl);
          showError(textEl, errMsg);
          sendBtn.disabled = false;
          return;
        }

        // Read the SSE stream
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";
        let fullText = "";

        removeTypingIndicator(textEl);

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = line.slice(6).trim();
            if (!data) continue;

            try {
              const parsed = JSON.parse(data);

              if (parsed.type === "text") {
                // Stream text token by token — this is why it feels "live"
                fullText += parsed.content;
                textEl.textContent = fullText;
                chatEl.scrollTop = chatEl.scrollHeight;
              }

              if (parsed.type === "tool") {
                // Show tool call in the UI using safe DOM methods
                const toolDiv = document.createElement("div");
                toolDiv.className = "tool-call";

                const nameSpan = document.createElement("span");
                nameSpan.className = "tool-name";
                nameSpan.textContent = parsed.name;

                const argsSpan = document.createElement("span");
                argsSpan.className = "tool-args";
                argsSpan.textContent = JSON.stringify(parsed.args);

                const resultDiv = document.createElement("div");
                resultDiv.className = "tool-result";
                resultDiv.textContent = "-> " + JSON.stringify(parsed.result);

                toolDiv.appendChild(nameSpan);
                toolDiv.appendChild(document.createTextNode("("));
                toolDiv.appendChild(argsSpan);
                toolDiv.appendChild(document.createTextNode(")"));
                toolDiv.appendChild(resultDiv);

                contentEl.appendChild(toolDiv);
                chatEl.scrollTop = chatEl.scrollHeight;
              }

              if (parsed.type === "done") {
                if (fullText) {
                  conversationHistory.push({ role: "assistant", content: fullText });
                }
              }

              if (parsed.error) {
                showError(textEl, parsed.error);
              }
            } catch {
              // skip malformed chunks
            }
          }
        }
      } catch (err) {
        removeTypingIndicator(textEl);
        showError(textEl, "Connection error: " + err.message);
      }

      sendBtn.disabled = false;
      input.focus();
    });

    // ============================================
    // UI Helpers
    // ============================================

    function addMessage(role, text) {
      const msg = document.createElement("div");
      msg.className = "message " + role;

      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.textContent = role === "user" ? "U" : "AI";

      const content = document.createElement("div");
      content.className = "content";

      const label = document.createElement("div");
      label.className = "role-label";
      label.textContent = role === "user" ? "You" : "Assistant";

      const textDiv = document.createElement("div");
      textDiv.className = "text";
      textDiv.textContent = text;

      content.appendChild(label);
      content.appendChild(textDiv);
      msg.appendChild(avatar);
      msg.appendChild(content);
      chatEl.appendChild(msg);
      chatEl.scrollTop = chatEl.scrollHeight;

      return { contentEl: content, textEl: textDiv };
    }

    function showTypingIndicator(el) {
      el.textContent = "";
      const indicator = document.createElement("div");
      indicator.className = "typing-indicator";
      for (let i = 0; i < 3; i++) {
        indicator.appendChild(document.createElement("span"));
      }
      el.appendChild(indicator);
    }

    function removeTypingIndicator(el) {
      const indicator = el.querySelector(".typing-indicator");
      if (indicator) indicator.remove();
    }

    function showError(el, message) {
      el.textContent = "";
      const errDiv = document.createElement("div");
      errDiv.className = "error-msg";
      errDiv.textContent = message;
      el.appendChild(errDiv);
    }
  </script>
</body>
</html>
